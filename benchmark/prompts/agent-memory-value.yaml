name: agent-memory-value

description: |
  Stress-test for long-term agent memory value under aggressive context pressure.
  The prompts intentionally: (1) plant crisp, verifiable facts, (2) force very long
  responses to rapidly fill the context window, (3) later query earlier facts so it
  is obvious whether the agent forgot.

prompts:
  # Seed a small set of high-signal facts (easy to grade)
  - |
    Please remember these five facts exactly (you may store them in long-term memory):
    1) ContactName = "Avery Park"
    2) Company = "Northstar Robotics"
    3) ProductCodename = "ORCHID-7"
    4) LaunchDate = "2031-04-19"
    5) VerificationPhrase = "glass-cactus"

  # Start flooding context with a long, structured output
  - |
    Write a highly detailed internal design doc (at least 1800 words) for a fictional
    agent platform called "Mnemos".

    Requirements:
    - Use many headings and subheadings.
    - Include: architecture overview, threat model, evaluation plan, failure modes,
      and an appendix with a glossary.
    - Add at least 12 bullet lists.
    - Add at least 3 code blocks (any language).
    - Be verbose.

  # More context pressure, different style
  - |
    Now write a 60-turn fictional meeting transcript (at least 1800 words) between:
    - A Product Manager
    - A Staff Engineer
    - A Security Engineer
    - An SRE

    Make the transcript realistic, with interruptions, clarifying questions, and
    occasional disagreements. Ensure each participant speaks at least 12 times.

  # First memory check (should be easy if memory works)
  - |
    Quick check (answer succinctly):
    What is the ProductCodename and the VerificationPhrase you were asked to remember?

  # Push the context hard again
  - |
    Write a very long, detailed comparison (at least 2000 words) of three fictional
    databases ("AtlasDB", "PineconeSQL", "RiverKV") for agent workloads.

    Constraints:
    - Include a section called "When memory compaction happens".
    - Include 15 concrete examples of queries or APIs (you can invent them).
    - Include a section called "Decision" with a clear final recommendation.

  # Plant more facts late, so retrieval must discriminate early vs late
  - |
    Please remember these additional facts exactly (you may store them in long-term memory):
    6) SupportEmail = "support@northstar-robotics.example"
    7) BillingPlan = "Zero-Signup"
    8) IncidentTicket = "INC-88421"

  # Another big response to encourage compaction/new session
  - |
    Write an extremely verbose, step-by-step incident report (at least 2000 words)
    for IncidentTicket INC-88421.

    Must include:
    - Timeline with timestamps (invent them)
    - Root cause analysis (5 Whys)
    - Customer impact
    - Corrective actions
    - Preventive actions
    - Postmortem FAQ

  # Final memory check across both early and late facts
  - |
    Final check (answer in one line, exact values):
    ContactName | Company | ProductCodename | LaunchDate | VerificationPhrase | SupportEmail | BillingPlan | IncidentTicket
