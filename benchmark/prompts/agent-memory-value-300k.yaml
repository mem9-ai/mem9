name: agent-memory-value-300k

description: |
  Wikipedia-assisted stress test targeting ~300k context window utilization while
  still making long-term agent memory value obvious.

  Idea:
  - Instead of injecting huge CHUNKs directly, the agent is instructed to fetch a
    handful of large Wikipedia pages and include substantial verbatim excerpts.
  - This can fill context quickly, but it is less deterministic than direct chunk
    injection because web access and per-response output caps vary by runtime.

  Notes:
  - If the runtime has strict per-response output limits, the agent should split
    excerpts across multiple turns using the EXACT token CONTINUE.

prompts:
  - |
    Context: Here are eight exact facts that may be useful later in this conversation.
    (Keep spelling, punctuation, and casing exactly as written.)

    1) ContactName = "Avery Park"
    2) Company = "Northstar Robotics"
    3) ProductCodename = "ORCHID-7"
    4) LaunchDate = "2031-04-19"
    5) VerificationPhrase = "glass-cactus"
    6) SupportEmail = "support@northstar-robotics.example"
    7) BillingPlan = "Zero-Signup"
    8) IncidentTicket = "INC-88421"

  - |
    Wikipedia filler block #1.

    Task:
    1) Open and read these Wikipedia pages:
       - https://en.wikipedia.org/wiki/Transformer_(machine_learning_model)
       - https://en.wikipedia.org/wiki/Vector_database
       - https://en.wikipedia.org/wiki/Retrieval-augmented_generation

    2) For EACH page, paste LARGE verbatim excerpts into the chat (not just a summary).
       - Include the lead section and at least 2 additional sections.
       - Keep the original wording as much as possible.
       - Label each excerpt with: PAGE_TITLE / SECTION_TITLE.

    3) After pasting the excerpts for all pages, write a short bullet summary (max 10 bullets).

    Output control:
    - If you hit an output limit, stop immediately and print only: CONTINUE

  - "Continue the Wikipedia filler block #1 exactly where you left off. End with CONTINUE if you hit an output limit."
  - "Continue the Wikipedia filler block #1 exactly where you left off. End with CONTINUE if you hit an output limit."

  - |
    Memory check #1 (answer in one line, exact values):
    ContactName | ProductCodename | VerificationPhrase | IncidentTicket

  - |
    Wikipedia filler block #2.

    Task:
    1) Open and read these Wikipedia pages:
       - https://en.wikipedia.org/wiki/Database
       - https://en.wikipedia.org/wiki/Distributed_database
       - https://en.wikipedia.org/wiki/ACID

    2) For EACH page, paste LARGE verbatim excerpts into the chat.
       - Include the lead section and at least 2 additional sections.
       - Label each excerpt with: PAGE_TITLE / SECTION_TITLE.

    3) Then write a short bullet summary (max 10 bullets).

    Output control:
    - If you hit an output limit, stop immediately and print only: CONTINUE

  - "Continue the Wikipedia filler block #2 exactly where you left off. End with CONTINUE if you hit an output limit."
  - "Continue the Wikipedia filler block #2 exactly where you left off. End with CONTINUE if you hit an output limit."

  - |
    Memory check #2 (answer succinctly, exact strings):
    What are Company, SupportEmail, and BillingPlan?

  - |
    Wikipedia filler block #3.

    Task:
    1) Open and read these Wikipedia pages:
       - https://en.wikipedia.org/wiki/Information_retrieval
       - https://en.wikipedia.org/wiki/Knowledge_graph

    2) Paste LARGE verbatim excerpts (lead + 2 sections per page) with labels.

    3) Then write a short bullet summary (max 10 bullets).

    Output control:
    - If you hit an output limit, stop immediately and print only: CONTINUE

  - "Continue the Wikipedia filler block #3 exactly where you left off. End with CONTINUE if you hit an output limit."

  - |
    Final memory check (one line, exact values):
    ContactName | Company | ProductCodename | LaunchDate | VerificationPhrase | SupportEmail | BillingPlan | IncidentTicket
