description: Tests long-term memory retention over 100 simulated farm days with deterministic
  store/query pairs
name: farm-memory
prompts:
- I'll telling a farm story of 40 days.
- 'Day1: pig chased bucket'
- What happened in Day1
- Write a fairy tale (at least 500 words) set on Day 1 of the farm. The tale must
  reference and build upon the specific events that happened on ALL previous days
  — recall every animal, action, and object from each prior day and weave them into
  the narrative. For each previous day, mention what happened and show how it connects
  to today's events. Include named characters for the animals, elaborate dialogue,
  vivid descriptions, and a moral lesson that ties together the entire history so
  far. Be as lengthy and descriptive as possible.
