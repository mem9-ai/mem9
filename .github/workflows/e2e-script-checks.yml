name: E2E script checks

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/e2e-script-checks.yml"
      - "Makefile"
      - "e2e/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/e2e-script-checks.yml"
      - "Makefile"
      - "e2e/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-check:
    name: Offline e2e script checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check scripts
        run: make e2e-check
